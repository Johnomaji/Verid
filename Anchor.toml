[toolchain]
anchor_version = "0.30.1"

[features]
resolution = true
skip-lint = false

[programs.devnet]
attestation    = "Atst111111111111111111111111111111111111111"
receipt_mint   = "Rcpt111111111111111111111111111111111111111"
lien_registry  = "Lien111111111111111111111111111111111111111"
lending_pool   = "Pool111111111111111111111111111111111111111"

[registry]
url = "https://api.apr.dev"

[provider]
cluster  = "devnet"
wallet   = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
